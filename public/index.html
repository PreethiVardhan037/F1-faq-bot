<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAQBot - Smart FAQ Assistant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1> FAQBot </h1>
        <p class="subtitle">Powered by Azure OpenAI</p>

        <!-- System Prompt Section -->
        <div class="card">
            <h2>System Prompt</h2>
            <p>Tell the bot who it is and what it knows</p>
            <textarea id="systemPrompt" placeholder="This bot by default has a System Prompt such that it answers all Formula One Racing related questions,type hear to change the system prompt">You are an expert Formula 1 assistant. Answer only Formula 1-related questions accurately and clearly. If a question is outside Formula 1, politely inform the user that you only handle F1 queries..</textarea>
        </div>

        <!-- Chat Section -->
        <div class="card">
            <h2>Ask a Question</h2>
            <div id="chatBox" class="chat-box">
                <div class="message bot"> Hi! I am FAQBot. Ask me anything!</div>
            </div>
            <div class="input-row">
                <input type="text" id="userInput" placeholder="Type your question here..." />
                <button id="sendBtn">Send</button>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
